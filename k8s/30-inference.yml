apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-api
  namespace: porto
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inference-api
  template:
    metadata:
      labels:
        app: inference-api
    spec:
      initContainers:
        - name: wait-for-mlflow
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z mlflow-server 5000; do sleep 2; done"]
      containers:
        - name: inference-api
          image: saze21/mlops-porto-inference-api:v2.2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_NAME
              valueFrom:
                configMapKeyRef:
                  name: porto-config
                  key: MODEL_NAME
            - name: DEFAULT_ALIAS
              valueFrom:
                configMapKeyRef:
                  name: porto-config
                  key: DEFAULT_ALIAS
            - name: PREP_PATH
              value: /data/training/processed/preprocessors.pkl
            - name: MLFLOW_TRACKING_URI
              value: http://mlflow-server:5000
            - name: MLFLOW_S3_ENDPOINT_URL
              value: http://minio:9000
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: porto-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: porto-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_DEFAULT_REGION
              valueFrom:
                configMapKeyRef:
                  name: porto-config
                  key: AWS_DEFAULT_REGION
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: app-data
              mountPath: /data
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: app-data-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: inference-api
  namespace: porto
spec:
  selector:
    app: inference-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamlit
  namespace: porto
spec:
  replicas: 1
  selector:
    matchLabels:
      app: streamlit
  template:
    metadata:
      labels:
        app: streamlit
    spec:
      initContainers:
        - name: wait-for-inference
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z inference-api 8000; do sleep 2; done"]
      containers:
        - name: streamlit
          image: saze21/mlops-porto-streamlit:v2.2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8501
          env:
            - name: MODEL_NAME
              valueFrom:
                configMapKeyRef:
                  name: porto-config
                  key: MODEL_NAME
            - name: STREAMLIT_SERVER_ENABLECORS
              value: "false"
            - name: MLFLOW_TRACKING_URI
              value: http://mlflow-server:5000
            - name: MLFLOW_S3_ENDPOINT_URL
              value: http://minio:9000
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: porto-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: porto-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_DEFAULT_REGION
              valueFrom:
                configMapKeyRef:
                  name: porto-config
                  key: AWS_DEFAULT_REGION
          volumeMounts:
            - name: app-data
              mountPath: /data
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: app-data-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: streamlit
  namespace: porto
spec:
  selector:
    app: streamlit
  ports:
    - name: http
      port: 8501
      targetPort: 8501

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: porto
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
      volumes:
        - name: prometheus-config
          persistentVolumeClaim:
            claimName: prometheus-config-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: porto
spec:
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: porto
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: porto-secrets
                  key: GF_USER
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: porto-secrets
                  key: GF_PASSWORD
          volumeMounts:
            - name: grafana-provisioning
              mountPath: /etc/grafana/provisioning
            - name: grafana-dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: grafana-provisioning
          persistentVolumeClaim:
            claimName: grafana-provisioning-pvc
        - name: grafana-dashboards
          persistentVolumeClaim:
            claimName: grafana-dashboards-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: porto
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000

---
