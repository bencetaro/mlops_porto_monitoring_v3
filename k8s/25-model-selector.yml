apiVersion: batch/v1
kind: Job
metadata:
  name: model-selector
  namespace: porto
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: model-selector
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-trainers
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for training jobs to complete..."
              for i in 0 1 2 3; do
                until [ -f /pipeline/trainer_${i}.done ]; do sleep 2; done
              done
          volumeMounts:
            - name: pipeline-data
              mountPath: /pipeline
      containers:
        - name: model-selector
          image: saze21/mlops-porto-trainer:v2.2
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "src.training.select_best_model"]
          env:
            - name: MLFLOW_TRACKING_URI
              value: http://mlflow-server:5000
            - name: MLFLOW_S3_ENDPOINT_URL
              value: http://minio:9000
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: porto-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: porto-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_DEFAULT_REGION
              valueFrom:
                configMapKeyRef:
                  name: porto-config
                  key: AWS_DEFAULT_REGION
          volumeMounts:
            - name: pipeline-data
              mountPath: /pipeline
      volumes:
        - name: pipeline-data
          persistentVolumeClaim:
            claimName: pipeline-pvc
