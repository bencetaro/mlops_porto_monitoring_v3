apiVersion: v1
kind: Service
metadata:
  name: inference-api-nodeport
  namespace: porto
spec:
  type: NodePort
  selector:
    app: inference-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30080

---
apiVersion: v1
kind: Service
metadata:
  name: streamlit-nodeport
  namespace: porto
spec:
  type: NodePort
  selector:
    app: streamlit
  ports:
    - name: http
      port: 8501
      targetPort: 8501
      nodePort: 30081

---
apiVersion: v1
kind: Service
metadata:
  name: grafana-nodeport
  namespace: porto
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30082

---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-nodeport
  namespace: porto
spec:
  type: NodePort
  selector:
    app: mlflow-server
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      nodePort: 30083
